<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Premium Shop v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }

        /* Sidebar Base Style */
        .my-sidebar {
            position: fixed;
            top: 0;
            height: 100%;
            width: 85%;
            max-width: 320px;
            background-color: white;
            z-index: 9999; /* Sabse upar */
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        /* Left Sidebar Position */
        #left-menu { left: -350px; }
        #left-menu.active { left: 0; }

        /* Right Sidebar Position */
        #right-cart { right: -350px; }
        #right-cart.active { right: 0; }

        /* Overlay Fix */
        #overlay-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 9998; /* Sidebar se just niche */
            display: none;
        }
        #overlay-screen.active { display: block; }

        /* Toast Popup */
        #toast-msg {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10000;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }
        #toast-msg.show { opacity: 1; bottom: 60px; }
    </style>
</head>
<body>

    <div id="toast-msg">Item Added to Cart</div>

    <div id="overlay-screen" onclick="closeSidebars()"></div>

    <div id="left-menu" class="my-sidebar">
        <div class="p-6 border-b flex justify-between items-center">
            <h2 class="text-xl font-black text-indigo-600 uppercase">Explore</h2>
            <button onclick="closeSidebars()"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        <div class="p-6 space-y-8 flex-grow">
            <div class="space-y-5">
                <a href="#" class="flex items-center space-x-4 text-gray-800 font-bold text-lg">
                    <i class="fa-solid fa-map-location-dot"></i> <span>Track Order</span>
                </a>
            </div>
            <div class="pt-6 border-t">
                <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-4">Categories</p>
                <ul class="space-y-6 font-semibold text-gray-700">
                    <li class="flex justify-between items-center">Jeans <i class="fa-solid fa-chevron-right text-[10px]"></i></li>
                    <li class="flex justify-between items-center">Premium T-Shirts <i class="fa-solid fa-chevron-right text-[10px]"></i></li>
                    <li class="flex justify-between items-center">Jackets <i class="fa-solid fa-chevron-right text-[10px]"></i></li>
                    <li class="flex justify-between items-center">Accessories <i class="fa-solid fa-chevron-right text-[10px]"></i></li>
                </ul>
            </div>
        </div>
        <div class="p-6 bg-gray-50 text-[10px] text-center font-bold text-gray-400 tracking-widest">
            MADE FOR YOU © 2026
        </div>
    </div>

    <div id="right-cart" class="my-sidebar">
        <div class="p-6 border-b flex justify-between items-center">
            <h2 class="text-xl font-black text-indigo-600 uppercase">My Bag</h2>
            <button onclick="closeSidebars()"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        <div id="cart-list" class="flex-grow overflow-y-auto p-4 space-y-4">
            <div class="text-center py-20 text-gray-300 italic">Your bag is empty</div>
        </div>
        <div class="p-6 border-t bg-white">
            <div class="flex justify-between items-center mb-4">
                <span class="font-bold text-gray-500">Subtotal:</span>
                <span id="cart-total" class="text-2xl font-black text-indigo-600">$0.00</span>
            </div>
            <button class="w-full bg-black text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition">
                Checkout Now
            </button>
        </div>
    </div>

    <nav class="fixed top-0 w-full bg-white h-16 flex items-center px-4 gap-3 z-[1000] border-b shadow-sm">
        <button onclick="openLeftMenu()" class="p-2">
            <i class="fa-solid fa-bars-staggered text-xl"></i>
        </button>
        
        <div class="flex-grow flex items-center bg-gray-100 h-10 px-3 rounded-xl border border-gray-200">
            <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm mr-2"></i>
            <input type="text" placeholder="Search Style..." class="bg-transparent outline-none text-xs w-full font-semibold">
        </div>

        <button onclick="openRightCart()" class="relative p-2">
            <i class="fa-solid fa-bag-shopping text-xl"></i>
            <span id="badge-count" class="absolute top-0 right-0 bg-indigo-600 text-white text-[9px] font-black rounded-full h-4 w-4 flex items-center justify-center border border-white">0</span>
        </button>
    </nav>

    <main class="pt-20 px-4 pb-20">
        <div class="py-6">
            <h1 class="text-4xl font-black tracking-tighter leading-none text-gray-900">
                Elevate Your <br><span class="text-indigo-600">Style.</span>
            </h1>
        </div>

        <div id="grid-container" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <script>
        let cart = [];
        const catalog = [
            { name: "Studio Pods", price: 129, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" },
            { name: "Arctic Watch", price: 199, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" },
            { name: "Neon Sneakers", price: 85, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" }
        ];

        // Sidebar Control
        function openLeftMenu() {
            document.getElementById('left-menu').classList.add('active');
            document.getElementById('overlay-screen').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function openRightCart() {
            document.getElementById('right-cart').classList.add('active');
            document.getElementById('overlay-screen').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebars() {
            document.getElementById('left-menu').classList.remove('active');
            document.getElementById('right-cart').classList.remove('active');
            document.getElementById('overlay-screen').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Build 25 Products Grid
        const grid = document.getElementById('grid-container');
        for (let i = 0; i < 25; i++) {
            const p = catalog[i % catalog.length];
            const id = i + 1;
            grid.innerHTML += `
                <div class="bg-white rounded-[28px] p-2 border border-gray-100 shadow-sm flex flex-col">
                    <div class="aspect-square rounded-[22px] overflow-hidden bg-gray-50 mb-3">
                        <img src="${p.img}" class="w-full h-full object-cover">
                    </div>
                    <div class="px-1 flex-grow">
                        <h3 class="font-bold text-[11px] text-gray-700 truncate tracking-tight uppercase">${p.name} #${id}</h3>
                        <p class="text-indigo-600 font-black text-sm mb-3">$${p.price}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-1">
                        <button onclick="addToCart(${id}, '${p.name}', ${p.price}, '${p.img}')" class="bg-gray-100 text-[9px] font-black py-2.5 rounded-xl active:bg-gray-200">CART</button>
                        <button class="bg-indigo-600 text-white text-[9px] font-black py-2.5 rounded-xl active:bg-indigo-700">BUY</button>
                    </div>
                </div>
            `;
        }

        // Cart Logic
        function addToCart(id, name, price, img) {
            const existing = cart.find(x => x.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price, img, qty: 1 });
            }
            renderCart();
            
            // Notification
            const toast = document.getElementById('toast-msg');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const totalDisplay = document.getElementById('cart-total');
            const badge = document.getElementById('badge-count');
            
            let totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            badge.innerText = totalQty;

            if (cart.length === 0) {
                list.innerHTML = '<div class="text-center py-20 text-gray-300 italic">Your bag is empty</div>';
                totalDisplay.innerText = "$0.00";
                return;
            }

            let html = '', subtotal = 0;
            cart.forEach(item => {
                subtotal += (item.price * item.qty);
                html += `
                    <div class="flex items-center space-x-4 bg-gray-50 p-3 rounded-2xl border border-gray-100">
                        <img src="${item.img}" class="w-14 h-14 object-cover rounded-xl">
                        <div class="flex-grow">
                            <h4 class="font-bold text-xs text-gray-800">${item.name}</h4>
                            <p class="text-indigo-600 text-xs font-black">$${item.price} (x${item.qty})</p>
                        </div>
                        <button onclick="remove(${item.id})" class="text-gray-300 p-2"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
            });
            list.innerHTML = html;
            totalDisplay.innerText = `$${subtotal.toFixed(2)}`;
        }

        function remove(id) {
            cart = cart.filter(x => x.id !== id);
            renderCart();
        }
    </script>
</body>
</html>
